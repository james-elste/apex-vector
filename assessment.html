<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content="Technology Leadership Readiness Assessment — a confidential evaluation of your proficiency and organizational context across AI, blockchain, cybersecurity, and data science. Fifteen minutes. Genuine insights.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://apex-vector.com/assessment.html">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Leadership Readiness Assessment — The Apex Vector Studio</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================
     APEX VECTOR BRAND TOKENS
     (Shared with index.html)
     ============================================ */
  :root {
    --black: #111111;
    --charcoal: #2A2A2A;
    --gold: #C9A84C;
    --gold-light: #DDBF6B;
    --gold-dark: #A8882E;
    --text: #3D3D3D;
    --gray-med: #6B6B6B;
    --sand: #F8F7F5;
    --border: #D6D2CA;
    --white: #FFFFFF;

    --font-heading: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Outfit', Arial, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: var(--font-body);
    color: var(--white);
    background: var(--black);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  img { max-width: 100%; display: block; }
  a { text-decoration: none; color: inherit; }

  /* ============================================
     NAVIGATION (identical to index.html)
     ============================================ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(17, 17, 17, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201, 168, 76, 0.08);
    transition: all 0.4s ease;
  }

  nav.scrolled {
    padding: 0.8rem 3rem;
    background: rgba(17, 17, 17, 0.97);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .nav-logo-icon {
    height: 38px;
    width: auto;
    transition: height 0.4s ease;
  }

  nav.scrolled .nav-logo-icon { height: 30px; }

  .nav-logo-text-block {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }

  .nav-logo-the {
    font-family: var(--font-body);
    font-size: 0.45rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    line-height: 1;
  }

  .nav-logo-name {
    font-family: var(--font-heading);
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.1;
  }

  .nav-logo-studio {
    font-family: var(--font-body);
    font-size: 0.5rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    line-height: 1;
    margin-top: 1px;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .nav-links a {
    font-family: var(--font-body);
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-med);
    transition: color 0.3s ease;
    font-weight: 400;
  }

  .nav-links a:hover { color: var(--gold-light); }

  .nav-cta {
    padding: 0.55rem 1.6rem;
    border: 1px solid var(--gold);
    color: var(--gold) !important;
    transition: all 0.3s ease !important;
  }

  .nav-cta:hover {
    background: var(--gold);
    color: var(--black) !important;
  }


  /* ============================================
     SHARED UTILITIES
     ============================================ */
  .label {
    font-family: var(--font-body);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .label--centered { justify-content: center; }

  .gold-rule {
    width: 48px;
    height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }

  .btn-primary {
    display: inline-block;
    padding: 0.85rem 2.5rem;
    background: var(--gold);
    color: var(--black);
    font-family: var(--font-body);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    border: 1px solid var(--gold);
    cursor: pointer;
  }

  .btn-primary:hover {
    background: transparent;
    color: var(--gold);
  }

  .btn-ghost {
    display: inline-block;
    padding: 0.85rem 2.5rem;
    border: 1px solid rgba(201, 168, 76, 0.3);
    color: var(--gold-light);
    font-family: var(--font-body);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    cursor: pointer;
    background: transparent;
  }

  .btn-ghost:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ============================================
     FOOTER (identical to index.html)
     ============================================ */
  footer {
    background: var(--black);
    padding: 2rem 3rem;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
  }

  .footer-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .footer-icon {
    height: 28px;
    width: auto;
    opacity: 0.8;
  }

  .footer-brand-text {
    font-family: var(--font-body);
    font-size: 0.75rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 300;
  }

  .footer-brand-text strong {
    font-weight: 600;
  }

  .footer-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.3rem;
  }

  .footer-copy {
    font-size: 0.7rem;
    color: rgba(255, 255, 255, 0.25);
    font-weight: 300;
  }

  .footer-tagline {
    font-family: var(--font-heading);
    font-size: 0.8rem;
    font-style: italic;
    color: rgba(201, 168, 76, 0.3);
    font-weight: 400;
  }

  .footer-links {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.3rem;
  }

  .footer-links a {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    transition: color 0.3s;
    font-weight: 400;
  }

  .footer-links a:hover { color: var(--gold); }

  /* ============================================
     ASSESSMENT — LAYOUT
     ============================================ */
  .assessment-page {
    min-height: 100vh;
    padding: 8rem 3rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .assessment-container {
    max-width: 760px;
    width: 100%;
    position: relative;
  }

  .assessment-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .assessment-header h1 {
    font-family: var(--font-heading);
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 300;
    color: var(--white);
    line-height: 1.2;
    margin-top: 1rem;
  }

  .assessment-header h2 {
    font-family: var(--font-heading);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 300;
    color: var(--white);
    line-height: 1.2;
    margin-top: 1rem;
  }

  .assessment-header p {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-top: 1rem;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ============================================
     PROGRESS BAR — 4 PHASES
     ============================================ */
  .progress-wrapper {
    margin-bottom: 3rem;
  }

  .progress-phases {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .progress-phase {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .progress-phase-label {
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
    transition: color 0.3s;
    text-align: center;
  }

  .progress-phase.active .progress-phase-label {
    color: var(--gold);
  }

  .progress-phase.completed .progress-phase-label {
    color: rgba(201, 168, 76, 0.5);
  }

  .progress-bar-track {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-phase.active .progress-bar-track {
    background: rgba(201, 168, 76, 0.15);
  }

  .progress-phase.completed .progress-bar-fill {
    width: 100%;
    background: var(--gold-dark);
  }

  .progress-overall {
    font-size: 0.65rem;
    color: var(--gray-med);
    text-align: right;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  /* ============================================
     QUESTION CARD
     ============================================ */
  .question-card {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 3rem;
    position: relative;
    animation: cardIn 0.4s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-card h2 {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .question-card > p {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .question-phase-tag {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  .question-number {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    font-weight: 300;
    margin-bottom: 1.5rem;
  }

  .question-text {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.4;
    margin-bottom: 0.8rem;
  }

  .question-context {
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  /* ============================================
     ANSWER OPTIONS (single select + multi select)
     ============================================ */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option {
    background: var(--black);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .option:hover {
    border-color: rgba(201, 168, 76, 0.3);
    background: rgba(42, 42, 42, 0.5);
  }

  .option.selected {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.06);
  }

  .option-marker {
    width: 20px;
    height: 20px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    font-size: 0.6rem;
    color: var(--gold-dark);
    font-weight: 500;
    letter-spacing: 0;
    transition: all 0.25s;
  }

  /* Circular markers for multi-select (checkbox-style) */
  .option.multi-select .option-marker {
    border-radius: 3px;
  }

  .option.selected .option-marker {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }

  .option-text {
    font-size: 0.92rem;
    font-weight: 300;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    transition: color 0.25s;
  }

  .option.selected .option-text {
    color: var(--white);
    font-weight: 400;
  }

  .multi-select-hint {
    font-size: 0.72rem;
    color: var(--gold-dark);
    font-weight: 400;
    margin-bottom: 1rem;
    font-style: italic;
  }

  /* ============================================
     NAVIGATION BUTTONS
     ============================================ */
  .question-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 2.5rem;
    gap: 1rem;
  }

  .btn-disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  /* ============================================
     ROLE / CONTEXT GRID
     ============================================ */
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .role-option {
    background: var(--black);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 1.2rem;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }

  .role-option:hover {
    border-color: rgba(201, 168, 76, 0.3);
    background: rgba(42, 42, 42, 0.5);
  }

  .role-option.selected {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.06);
  }

  .role-option-title {
    font-family: var(--font-heading);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.3rem;
  }

  .role-option-desc {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--gray-med);
  }

  .role-screen {
    padding: 3rem;
  }

  .role-screen h2 {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .role-screen > p {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  /* ============================================
     RESULTS — LAYOUT
     ============================================ */
  .results-screen { animation: cardIn 0.5s ease; }

  .results-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .results-header h2 {
    font-family: var(--font-heading);
    font-size: clamp(1.8rem, 3.5vw, 2.4rem);
    font-weight: 300;
    color: var(--white);
    margin-top: 1rem;
  }

  .results-header p {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-top: 0.8rem;
  }

  /* Radar chart */
  .radar-container {
    display: flex;
    justify-content: center;
    margin-bottom: 3rem;
    overflow: visible;
  }

  .radar-chart {
    width: 400px;
    height: 400px;
    overflow: visible;
  }

  /* Pillar result cards */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .result-pillar-card {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 1.8rem;
  }

  .result-pillar-name {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .result-pillar-level {
    font-family: var(--font-heading);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.8rem;
  }

  .result-cc-badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border: 1px solid rgba(201, 168, 76, 0.3);
    color: var(--gold-light);
    font-weight: 500;
    margin-bottom: 0.8rem;
  }

  .result-bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .result-bar-fill {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .result-pillar-desc {
    font-size: 0.82rem;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }

  /* Org readiness card */
  .org-readiness-card {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 2rem;
    margin-bottom: 2rem;
  }

  .org-readiness-card h3 {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .org-readiness-level {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .org-readiness-desc {
    font-size: 0.88rem;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
  }

  .gap-indicator {
    margin-top: 1.2rem;
    padding-top: 1.2rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .gap-indicator-label {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold-dark);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .gap-indicator-text {
    font-size: 0.85rem;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }

  /* Insights */
  .results-insights {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 3rem;
    margin-bottom: 2rem;
  }

  .results-insights h3 {
    font-family: var(--font-heading);
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 1.5rem;
  }

  .insight-item {
    padding: 1rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .insight-item:last-child { border-bottom: none; }

  .insight-item p {
    font-size: 0.88rem;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    line-height: 1.7;
  }

  .insight-item strong {
    color: var(--gold-light);
    font-weight: 500;
  }

  .key-insight {
    background: rgba(201, 168, 76, 0.04);
    border-left: 2px solid var(--gold);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  .key-insight-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .key-insight p {
    font-size: 0.92rem;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
  }

  /* Threshold CTA */
  .threshold-cta {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.15);
    padding: 2.5rem;
    text-align: center;
    margin-bottom: 2rem;
  }

  .threshold-cta blockquote {
    font-family: var(--font-heading);
    font-size: 1.15rem;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    padding: 0 1rem;
  }

  .threshold-cta p {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  /* ============================================
     CONTACT FORM (below results)
     ============================================ */
  .results-form {
    background: var(--charcoal);
    border: 1px solid rgba(201, 168, 76, 0.08);
    padding: 3rem;
    text-align: center;
  }

  .results-form h3 {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 0.6rem;
  }

  .results-form > p {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--gray-med);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group.full-width {
    grid-column: 1 / -1;
  }

  .form-group label {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .form-group input,
  .form-group select {
    background: var(--black);

  // ===== PHASE 4: ORGANIZATIONAL CONTEXT =====
  const ORG_QUESTIONS = [
    {
      id: 'O1', phase: 4, type: 'single',
      text: 'Thinking about your organization\u2019s overall approach to technology transformation, which statement best describes where you are?',
      context: '',
      options: [
        { text: 'We react to technology changes as they affect us. There\u2019s no proactive strategy.', tag: 'org:reactive' },
        { text: 'We\u2019re aware of the need to transform but are struggling to move from awareness to action.', tag: 'org:stalled' },
        { text: 'We have active transformation initiatives but they\u2019re not well-coordinated across the organization.', tag: 'org:fragmented' },
        { text: 'We have a coordinated technology transformation strategy with executive sponsorship and clear milestones.', tag: 'org:strategic' }
      ]
    },
    {
      id: 'O2', phase: 4, type: 'multi',
      text: 'When your organization makes a significant technology decision, who is genuinely involved in the evaluation \u2014 not just informed, but actually shaping the decision?',
      context: 'Select all that apply.',
      options: [
        { text: 'CEO / President', tag: 'exec_involvement' },
        { text: 'CFO / Finance leadership', tag: 'exec_involvement' },
        { text: 'CIO / CTO / Technology leadership', tag: 'tech_involvement' },
        { text: 'CISO / Security leadership', tag: 'security_involvement' },
        { text: 'CHRO / People leadership', tag: 'people_involvement' },
        { text: 'Board / Advisory Board', tag: 'board_involvement' },
        { text: 'External advisors or consultants', tag: 'external_involvement' }
      ]
    },
    {
      id: 'O3', phase: 4, type: 'single',
      text: 'If you could change one thing about how your organization approaches technology, what would it be?',
      context: '',
      options: [
        { text: 'I wish we moved faster \u2014 we\u2019re too cautious and competitors are pulling ahead.', tag: 'org_gap:speed' },
        { text: 'I wish we were more strategic \u2014 we invest in technology without a clear connection to business outcomes.', tag: 'org_gap:strategy' },
        { text: 'I wish our leadership team was more aligned \u2014 technology decisions create conflict because we don\u2019t share a common understanding.', tag: 'org_gap:alignment' },
        { text: 'I wish I personally had more confidence to lead these conversations \u2014 I know we need to act but I\u2019m not sure I\u2019m the right person to drive it.', tag: 'org_gap:personal_confidence' }
      ]
    }
  ];

  const PILLAR_KEYS = ['ai', 'blockchain', 'cybersecurity', 'datascience'];
  const PILLAR_NAMES = { ai: 'Artificial Intelligence', blockchain: 'Blockchain & Digital Trust', cybersecurity: 'Cybersecurity', datascience: 'Data Science' };
  const PHASE_NAMES = ['Context', 'Pulse', 'Deep Dive', 'Org Context'];

  // ===== STATE =====
  let state = {
    screen: 'intro',           // intro | phase1 | phase2 | phase3 | phase4 | results
    phase: 1,
    questionIndex: 0,          // index within current phase's question list
    answers: {},               // { questionId: selectedIndex (single) or [indices] (multi) }
    tags: {},                  // accumulated tags from all answers
    gatewayLevels: {},         // { ai: 'UC'|'CI'|'CC'|'UCo', ... }
    contextData: {},           // role, industry, size, priority
    phase3Questions: [],       // selected deep dive questions
    pillarProfiles: {},        // final CC level per pillar
    orgLevel: null,
    orgGap: null,
    orgInvolvement: 0
  };

  const app = document.getElementById('assessmentApp');

  // ===== HELPER: get role from context =====
  function getRole() {
    const tag = state.contextData.role || '';
    return tag.replace('role:', '');
  }

  function getIndustry() {
    const tag = state.contextData.industry || '';
    return tag.replace('ind:', '');
  }

  function getPriority() {
    const tag = state.contextData.priority || '';
    return tag.replace('priority:', '');
  }

  // ===== BRANCHING ENGINE: Select Phase 3 Questions =====
  function selectPhase3Questions() {
    const role = getRole();
    const priority = getPriority();
    const selected = [];

    // Determine priority pillar from C-4
    let priorityPillar = null;
    if (priority === 'ai') priorityPillar = 'ai';
    else if (priority === 'cyber') priorityPillar = 'cybersecurity';
    else if (priority === 'data') priorityPillar = 'datascience';
    else if (priority === 'blockchain') priorityPillar = 'blockchain';
    // 'all' = no single priority, distribute evenly

    PILLAR_KEYS.forEach(pillar => {
      const gateway = state.gatewayLevels[pillar] || 'CI';
      const isFoundational = (gateway === 'UC' || gateway === 'CI');
      const track = isFoundational ? 'foundational' : 'strategic';
      const bank = DEEP_DIVE_BANK[pillar][track];

      // Filter by role relevance
      const eligible = bank.filter(q => {
        if (q.roles.includes('all')) return true;
        return q.roles.includes(role);
      });

      // Determine how many questions for this pillar
      let count;
      if (priorityPillar === pillar) {
        count = Math.min(3, eligible.length);
      } else if (priority === 'all') {
        count = Math.min(2, eligible.length);
      } else {
        count = Math.min(2, eligible.length);
      }

      // Select questions (take first N eligible — they're already ordered by relevance in the bank)
      for (let i = 0; i < count; i++) {
        selected.push(eligible[i]);
      }
    });

    state.phase3Questions = selected;
  }

  // ===== GET CURRENT QUESTION LIST FOR PHASE =====
  function getCurrentQuestions() {
    switch (state.phase) {
      case 1: return CONTEXT_QUESTIONS;
      case 2: return GATEWAY_QUESTIONS;
      case 3: return state.phase3Questions;
      case 4: return ORG_QUESTIONS;
      default: return [];
    }
  }

  // ===== TOTAL QUESTION COUNT =====
  function getTotalQuestions() {
    return CONTEXT_QUESTIONS.length + GATEWAY_QUESTIONS.length + state.phase3Questions.length + ORG_QUESTIONS.length;
  }

  function getAnsweredCount() {
    return Object.keys(state.answers).length;
  }

  // ===== RENDERING =====
  function render() {
    switch (state.screen) {
      case 'intro': renderIntro(); break;
      case 'assessment': renderQuestion(); break;
      case 'results': renderResults(); break;
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderIntro() {
    app.innerHTML = `
      <div class="assessment-header">
        <div class="label label--centered">
          <div class="gold-rule"></div>
          <span>Confidential Assessment</span>
          <div class="gold-rule"></div>
        </div>
        <h1>Technology Leadership Readiness Assessment</h1>
        <p>A private, adaptive evaluation that builds a personalized competence profile across four technology pillars. Every executive sees a different path. Approximately 15 minutes.</p>
      </div>
      <div class="question-card" style="text-align:center;">
        <h2>How This Works</h2>
        <p style="text-align:left;">This assessment moves through four phases. You\u2019ll start with a few questions about your context, then respond to scenarios across four technology domains. Your answers shape which questions come next \u2014 this is adaptive, not one-size-fits-all.</p>
        <p style="text-align:left; margin-top:0.5rem; margin-bottom:2rem; font-size:0.82rem; color:rgba(255,255,255,0.4);">Your responses are confidential. There are no trick questions and no wrong answers.</p>
        <button class="btn-primary" id="startBtn">Begin Assessment</button>
      </div>
    `;

    document.getElementById('startBtn').addEventListener('click', () => {
      state.screen = 'assessment';
      state.phase = 1;
      state.questionIndex = 0;
      render();
    });
  }

  function renderQuestion() {
    const questions = getCurrentQuestions();
    const q = questions[state.questionIndex];
    if (!q) return;

    const isMulti = q.type === 'multi';
    const currentAnswer = state.answers[q.id];
    const hasAnswer = isMulti ? (currentAnswer && currentAnswer.length > 0) : (currentAnswer !== undefined);

    // Phase tag
    let phaseTag = PHASE_NAMES[state.phase - 1];
    if (state.phase === 2 && q.pillar) {
      phaseTag = PILLAR_NAMES[q.pillar];
    } else if (state.phase === 3 && q.pillar) {
      phaseTag = PILLAR_NAMES[q.pillar] + (q.track === 'foundational' ? ' \u2014 Foundational' : ' \u2014 Strategic');
    }

    // Question numbering within phase
    const phaseNum = state.questionIndex + 1;
    const phaseTotal = questions.length;

    // Can go back?
    const canGoBack = !(state.phase === 1 && state.questionIndex === 0);

    // Is last question overall?
    const isLast = (state.phase === 4 && state.questionIndex === questions.length - 1);

    app.innerHTML = `
      <div class="assessment-header" style="margin-bottom: 2rem;">
        <div class="label label--centered">
          <div class="gold-rule"></div>
          <span>Confidential Assessment</span>
          <div class="gold-rule"></div>
        </div>
      </div>
      ${renderProgress()}
      <div class="question-card">
        <div class="question-phase-tag">${phaseTag}</div>
        <div class="question-number">Question ${phaseNum} of ${phaseTotal} \u2014 Phase ${state.phase} of 4</div>
        <div class="question-text">${q.text}</div>
        ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
        ${isMulti ? '<div class="multi-select-hint">Select all that apply</div>' : ''}
        <div class="options">
          ${q.options.map((opt, i) => {
            let isSelected = false;
            if (isMulti) {
              isSelected = currentAnswer && currentAnswer.includes(i);
            } else {
              isSelected = currentAnswer === i;
            }
            return `
              <div class="option${isSelected ? ' selected' : ''}${isMulti ? ' multi-select' : ''}" data-index="${i}">
                <div class="option-marker">${isMulti ? (isSelected ? '\u2713' : '') : String.fromCharCode(65 + i)}</div>
                <div class="option-text">${opt.text}</div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="question-nav">
          <button class="btn-ghost${!canGoBack ? ' btn-disabled' : ''}" id="prevBtn">Previous</button>
          ${(isMulti || isLast) ? `<button class="btn-primary${!hasAnswer ? ' btn-disabled' : ''}" id="nextBtn">${isLast ? 'View Your Results' : 'Continue'}</button>` : ''}
        </div>
      </div>
    `;

    // Helper: advance to next question
    function advanceQuestion() {
      processAnswer(q);
      if (state.questionIndex < questions.length - 1) {
        state.questionIndex++;
      } else {
        advancePhase();
      }
      render();
    }

    // Option click handlers
    app.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        if (isMulti) {
          // Multi-select: toggle and re-render (user clicks Continue when done)
          if (!state.answers[q.id]) state.answers[q.id] = [];
          const arr = state.answers[q.id];
          const pos = arr.indexOf(idx);
          if (pos === -1) arr.push(idx);
          else arr.splice(pos, 1);
          render();
        } else {
          // Single-select: store answer, show selection briefly, then auto-advance
          state.answers[q.id] = idx;
          // Visually highlight the selected option immediately (no full re-render)
          app.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
          el.classList.add('selected');
          el.querySelector('.option-marker').style.background = 'var(--gold)';
          el.querySelector('.option-marker').style.color = 'var(--black)';
          el.querySelector('.option-marker').style.borderColor = 'var(--gold)';
          el.querySelector('.option-text').style.color = 'var(--white)';
          el.querySelector('.option-text').style.fontWeight = '400';
          if (isLast) {
            // Last question: enable the View Results button instead of auto-advancing
            const nb = document.getElementById('nextBtn');
            if (nb) { nb.classList.remove('btn-disabled'); nb.addEventListener('click', advanceQuestion); }
          } else {
            // Brief pause so user sees their selection, then advance
            setTimeout(advanceQuestion, 350);
          }
        }
      });
    });

    // Nav handlers
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (state.questionIndex > 0) {
        state.questionIndex--;
      } else if (state.phase > 1) {
        state.phase--;
        const prevQuestions = getCurrentQuestions();
        state.questionIndex = prevQuestions.length - 1;
      }
      render();
    });

    // Continue button only exists for multi-select
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn && hasAnswer) {
      nextBtn.addEventListener('click', advanceQuestion);
    }
  }

  // ===== PROCESS ANSWER: Extract tags =====
  function processAnswer(q) {
    const answer = state.answers[q.id];
    if (answer === undefined) return;

    // Phase 1: Store context routing data
    if (q.phase === 1) {
      const opt = q.options[answer];
      if (q.id === 'C1') state.contextData.role = opt.tag;
      if (q.id === 'C2') state.contextData.industry = opt.tag;
      if (q.id === 'C3') state.contextData.size = opt.tag;
      if (q.id === 'C4') state.contextData.priority = opt.tag;
    }

    // Phase 2: Store gateway levels
    if (q.phase === 2 && q.pillar) {
      const opt = q.options[answer];
      state.gatewayLevels[q.pillar] = opt.level;
    }

    // Phase 3: Accumulate tags
    if (q.pillar && q.options) {
      if (q.type === 'multi' && Array.isArray(answer)) {
        answer.forEach(idx => {
          const opt = q.options[idx];
          if (opt && opt.tags) {
            Object.entries(opt.tags).forEach(([k, v]) => {
              if (!state.tags[q.id]) state.tags[q.id] = {};
              state.tags[q.id][k] = v;
            });
          } else if (opt && opt.tag) {
            if (!state.tags[q.id]) state.tags[q.id] = {};
            state.tags[q.id][opt.tag] = true;
          }
        });
      } else if (typeof answer === 'number') {
        const opt = q.options[answer];
        if (opt && opt.tags) {
          state.tags[q.id] = opt.tags;
        }
      }
    }

    // Phase 4: Store org data
    if (q.id === 'O1') {
      const opt = q.options[answer];
      state.contextData.orgLevel = opt.tag;
    }
    if (q.id === 'O2' && Array.isArray(answer)) {
      state.orgInvolvement = answer.length;
    }
    if (q.id === 'O3') {
      const opt = q.options[answer];
      state.contextData.orgGap = opt.tag;
    }
  }

  // ===== ADVANCE PHASE =====
  function advancePhase() {
    if (state.phase === 1) {
      state.phase = 2;
      state.questionIndex = 0;
    } else if (state.phase === 2) {
      // Build Phase 3 questions based on gateway results
      selectPhase3Questions();
      state.phase = 3;
      state.questionIndex = 0;
    } else if (state.phase === 3) {
      state.phase = 4;
      state.questionIndex = 0;
    } else if (state.phase === 4) {
      computeResults();
      state.screen = 'results';
    }
  }

  // ===== PROGRESS BAR =====
  function renderProgress() {
    const phases = [
      { name: 'Context', count: CONTEXT_QUESTIONS.length },
      { name: 'Pulse', count: GATEWAY_QUESTIONS.length },
      { name: 'Deep Dive', count: state.phase3Questions.length || 8 },
      { name: 'Org Context', count: ORG_QUESTIONS.length }
    ];

    return `
      <div class="progress-wrapper">
        <div class="progress-phases">
          ${phases.map((p, i) => {
            const phaseNum = i + 1;
            const isActive = phaseNum === state.phase;
            const isCompleted = phaseNum < state.phase;
            let pct = 0;
            if (isActive) {
              const questions = getCurrentQuestions();
              pct = questions.length > 0 ? (state.questionIndex / questions.length) * 100 : 0;
            }
            return `
              <div class="progress-phase${isActive ? ' active' : ''}${isCompleted ? ' completed' : ''}">
                <div class="progress-phase-label">${p.name}</div>
                <div class="progress-bar-track">
                  <div class="progress-bar-fill" style="width: ${isCompleted ? 100 : (isActive ? pct : 0)}%"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // ===== COMPUTE RESULTS =====
  function computeResults() {
    // Determine CC level per pillar from accumulated evidence
    PILLAR_KEYS.forEach(pillar => {
      const gateway = state.gatewayLevels[pillar] || 'CI';
      const levelCounts = { UC: 0, CI: 0, CC: 0, UCo: 0 };

      // Count gateway as initial signal
      levelCounts[gateway] += 2; // Gateway weighs double

      // Count Phase 3 tags
      Object.values(state.tags).forEach(tagSet => {
        if (!tagSet) return;
        // Check pillar-specific level tags
        const pillarKey = pillar === 'blockchain' ? 'bc' : pillar === 'cybersecurity' ? 'cy' : pillar === 'datascience' ? 'ds' : 'ai';
        if (tagSet[pillarKey]) {
          const level = tagSet[pillarKey];
          if (levelCounts[level] !== undefined) {
            levelCounts[level]++;
          }
        }
      });

      // Handle multi-select governance scoring for AI-S4
      if (pillar === 'ai') {
        const aiS4Answer = state.answers['AI_S4'];
        if (Array.isArray(aiS4Answer)) {
          if (aiS4Answer.length >= 4) levelCounts.UCo += 2;
          else if (aiS4Answer.length >= 2) levelCounts.CC += 1;
          else levelCounts.CI += 1;
        }
      }

      // Determine preponderant level
      let maxLevel = gateway;
      let maxCount = 0;
      Object.entries(levelCounts).forEach(([level, count]) => {
        if (count > maxCount) {
          maxCount = count;
          maxLevel = level;
        }
      });

      state.pillarProfiles[pillar] = maxLevel;
    });

    // Determine org readiness level
    const orgTag = state.contextData.orgLevel || '';
    if (orgTag.includes('reactive')) state.orgLevel = 'reactive';
    else if (orgTag.includes('stalled')) state.orgLevel = 'stalled';
    else if (orgTag.includes('fragmented')) state.orgLevel = 'fragmented';
    else if (orgTag.includes('strategic')) state.orgLevel = 'strategic';
    else state.orgLevel = 'reactive';

    // Org gap
    const gapTag = state.contextData.orgGap || '';
    if (gapTag.includes('speed')) state.orgGap = 'speed';
    else if (gapTag.includes('strategy')) state.orgGap = 'strategy';
    else if (gapTag.includes('alignment')) state.orgGap = 'alignment';
    else if (gapTag.includes('personal_confidence')) state.orgGap = 'personal_confidence';
  }

  // ===== CC LEVEL TO NUMERIC =====
  function ccToNum(level) {
    return { UC: 1, CI: 2, CC: 3, UCo: 4 }[level] || 1;
  }

  function orgToNum(level) {
    return { reactive: 1, stalled: 2, fragmented: 3, strategic: 4 }[level] || 1;
  }

  // ===== RADAR CHART (SVG) =====
  function renderRadarChart() {
    const size = 420;
    const center = size / 2;
    const radius = 130;
    const levels = 4;
    const pillars = PILLAR_KEYS;
    const n = pillars.length;

    // Generate polygon points for each level
    function getPoints(r) {
      return pillars.map((_, i) => {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        return [center + r * Math.cos(angle), center + r * Math.sin(angle)];
      });
    }

    // Grid lines
    let gridLines = '';
    for (let l = 1; l <= levels; l++) {
      const r = (radius / levels) * l;
      const pts = getPoints(r);
      gridLines += `<polygon points="${pts.map(p => p.join(',')).join(' ')}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    }

    // Axis lines
    let axisLines = '';
    pillars.forEach((_, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = center + radius * Math.cos(angle);
      const y = center + radius * Math.sin(angle);
      axisLines += `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    });

    // Data polygon
    const dataPoints = pillars.map((pillar, i) => {
      const level = ccToNum(state.pillarProfiles[pillar]);
      const r = (radius / levels) * level;
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      return [center + r * Math.cos(angle), center + r * Math.sin(angle)];
    });

    // Labels
    let labels = '';
    const shortNames = { ai: 'AI', blockchain: 'Blockchain', cybersecurity: 'Cyber', datascience: 'Data' };
    pillars.forEach((pillar, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const labelR = radius + 42;
      const x = center + labelR * Math.cos(angle);
      const y = center + labelR * Math.sin(angle);
      const anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : (Math.cos(angle) > 0 ? 'start' : 'end');
      labels += `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" fill="rgba(201,168,76,0.7)" font-family="Outfit,sans-serif" font-size="11" font-weight="500" letter-spacing="1">${shortNames[pillar].toUpperCase()}</text>`;
    });

    return `
      <div class="radar-container">
        <svg class="radar-chart" viewBox="0 0 ${size} ${size}" overflow="visible">
          ${gridLines}
          ${axisLines}
          <polygon points="${dataPoints.map(p => p.join(',')).join(' ')}"
            fill="rgba(201,168,76,0.12)" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round"/>
          ${dataPoints.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="var(--gold)"/>`).join('')}
          ${labels}
        </svg>
      </div>
    `;
  }

  // ===== GENERATE INSIGHTS =====
  function generateInsights() {
    const role = getRole();
    const roleNames = {
      ceo: 'CEO', cfo: 'CFO', cio: 'CIO/CTO', chro: 'CHRO', ciso: 'CISO',
      board: 'Board Member', other_exec: 'Senior Executive'
    };
    const roleName = roleNames[role] || 'Executive';
    const insights = [];

    // Find strongest and weakest pillars
    let strongest = null, weakest = null;
    let maxNum = 0, minNum = 5;
    PILLAR_KEYS.forEach(p => {
      const num = ccToNum(state.pillarProfiles[p]);
      if (num > maxNum) { maxNum = num; strongest = p; }
      if (num < minNum) { minNum = num; weakest = p; }
    });

    const strongName = PILLAR_NAMES[strongest];
    const weakName = PILLAR_NAMES[weakest];
    const strongCC = CC_LEVELS[state.pillarProfiles[strongest]];
    const weakCC = CC_LEVELS[state.pillarProfiles[weakest]];

    // Insight 1: Strength
    if (maxNum >= 3) {
      insights.push(`<strong>${strongName}</strong> is your most developed pillar, placing you at ${strongCC.short}. As a ${roleName}, this capability positions you to lead confidently in this domain \u2014 and to mentor others on your team who may be less certain.`);
    } else {
      insights.push(`Your strongest area is <strong>${strongName}</strong>, currently at ${strongCC.short}. Even in your area of greatest comfort, there is meaningful room to build the kind of executive fluency that transforms how your organization approaches this domain.`);
    }

    // Insight 2: Role-contextualized gap
    const roleGapContexts = {
      ceo: `As CEO, your ability to set direction across all four pillars directly shapes organizational confidence. Strengthening your <strong>${weakName}</strong> fluency would close the gap between vision and credible execution.`,
      cfo: `Financial leadership increasingly requires fluency in technology risk and value. Deepening your understanding of <strong>${weakName}</strong> would strengthen your ability to evaluate investments and articulate risk in terms the board expects.`,
      cio: `Even with deep technology expertise, <strong>${weakName}</strong> may represent an area where your strategic positioning could sharpen. Peer executives look to you for cross-domain technology judgment.`,
      ciso: `Security leadership increasingly intersects with every technology domain. Building depth in <strong>${weakName}</strong> would strengthen your ability to frame security within broader strategic conversations.`,
      chro: `People strategy is inseparable from technology strategy. Building confidence in <strong>${weakName}</strong> would strengthen your ability to lead workforce transformation and talent development initiatives.`,
      board: `Board-level oversight requires confident engagement across all technology domains. Strengthening your <strong>${weakName}</strong> literacy would enhance your ability to ask the right questions and provide meaningful governance.`,
      other_exec: `Building deeper fluency in <strong>${weakName}</strong> would expand your strategic toolkit and strengthen your ability to contribute to cross-functional technology decisions.`
    };
    insights.push(roleGapContexts[role] || roleGapContexts.other_exec);

    // Insight 3: Cross-pillar pattern
    const allNums = PILLAR_KEYS.map(p => ccToNum(state.pillarProfiles[p]));
    const avg = allNums.reduce((a, b) => a + b, 0) / 4;
    const variance = allNums.reduce((sum, s) => sum + Math.pow(s - avg, 2), 0) / 4;

    if (variance < 0.5) {
      insights.push(`Your readiness is <strong>relatively balanced</strong> across all four pillars \u2014 which is uncommon. This suggests either broad exposure or a consistent approach to technology leadership. The Apex Vector practice is designed to build on this foundation and take each domain to the next level of executive fluency.`);
    } else {
      const highPillars = PILLAR_KEYS.filter(p => ccToNum(state.pillarProfiles[p]) >= 3).map(p => PILLAR_NAMES[p]);
      const lowPillars = PILLAR_KEYS.filter(p => ccToNum(state.pillarProfiles[p]) <= 2).map(p => PILLAR_NAMES[p]);
      if (highPillars.length > 0 && lowPillars.length > 0) {
        insights.push(`There is a <strong>notable gap</strong> between your confidence in ${highPillars.join(' and ')} versus ${lowPillars.join(' and ')}. This is a common pattern among experienced leaders \u2014 depth in familiar domains and less exposure in others. A structured engagement would close these gaps efficiently while building on your existing strengths.`);
      } else {
        insights.push(`Your assessment reveals opportunities for growth across multiple domains. The most effective path forward is a structured engagement that builds confidence systematically \u2014 starting with the areas most critical to your current role and strategic priorities.`);
      }
    }

    return insights;
  }

  // ===== KEY INSIGHT (the "one thing they didn't know") =====
  function generateKeyInsight() {
    const role = getRole();
    const orgLvl = orgToNum(state.orgLevel);
    const weakest = PILLAR_KEYS.reduce((w, p) => ccToNum(state.pillarProfiles[p]) < ccToNum(state.pillarProfiles[w]) ? p : w, PILLAR_KEYS[0]);
    const weakNum = ccToNum(state.pillarProfiles[weakest]);
    const avgIndividual = PILLAR_KEYS.reduce((s, p) => s + ccToNum(state.pillarProfiles[p]), 0) / 4;

    // Gap between individual capability and org readiness
    if (avgIndividual > orgLvl + 1) {
      return `Your personal technology leadership capability appears to significantly exceed your organization\u2019s readiness to act on it. This gap suggests you may be constrained not by what you know, but by your organization\u2019s ability to follow through. The highest-leverage move isn\u2019t building more personal knowledge \u2014 it\u2019s building organizational capacity to match your strategic vision.`;
    }

    if (orgLvl > avgIndividual + 0.5) {
      return `Your organization\u2019s technology transformation ambitions may be outpacing your current comfort level in leading those conversations. This isn\u2019t a criticism \u2014 it\u2019s a common inflection point where targeted executive development creates immediate strategic impact.`;
    }

    if (state.orgGap === 'personal_confidence') {
      return `You identified personal confidence as the thing you\u2019d most like to change about how you approach technology leadership. That self-awareness is itself a strength \u2014 and it\u2019s precisely the kind of gap that targeted coaching closes quickly. The distance between \u2018I\u2019m not sure I\u2019m the right person\u2019 and \u2018I lead these conversations\u2019 is shorter than most executives expect.`;
    }

    if (state.orgGap === 'alignment') {
      return `You identified leadership alignment as your organization\u2019s biggest technology challenge. When leadership teams don\u2019t share a common technology vocabulary, every decision becomes a negotiation rather than a strategic choice. Building shared fluency across the executive team may be the single highest-ROI investment available to you right now.`;
    }

    if (weakNum <= 1) {
      return `Your ${PILLAR_NAMES[weakest]} profile suggests you may not yet recognize the specific risks and opportunities in this domain \u2014 which is more common among senior executives than most people realize. The most dangerous gap isn\u2019t the one you know about; it\u2019s the one you haven\u2019t identified yet. This is where coaching creates the most immediate value.`;
    }

    return `Your profile reveals an uneven landscape \u2014 strength in some domains paired with developing capability in others. This is the typical pattern for executives who have built expertise through experience rather than systematic development. A structured engagement would accelerate the areas where experience alone hasn\u2019t been sufficient.`;
  }

  // ===== RENDER RESULTS =====
  function renderResults() {
    const insights = generateInsights();
    const keyInsight = generateKeyInsight();
    const orgInfo = ORG_LEVELS[state.orgLevel] || ORG_LEVELS.reactive;

    // Org involvement analysis
    let involvementText = '';
    if (state.orgInvolvement <= 2) {
      involvementText = 'Technology decisions at your organization involve a narrow group, which may signal siloed decision-making. Broadening executive involvement often leads to better outcomes and stronger buy-in.';
    } else if (state.orgInvolvement <= 4) {
      involvementText = 'Your organization involves a moderate cross-section of leadership in technology decisions. There may be room to ensure security and people perspectives are consistently represented.';
    } else {
      involvementText = 'Technology decisions at your organization involve broad cross-functional input \u2014 a sign of mature governance and strategic alignment.';
    }

    // Gap analysis between individual and org
    const avgIndividual = PILLAR_KEYS.reduce((s, p) => s + ccToNum(state.pillarProfiles[p]), 0) / 4;
    const orgNum = orgToNum(state.orgLevel);
    let gapText = '';
    if (avgIndividual > orgNum + 0.5) {
      gapText = 'Your individual capability appears to exceed your organization\u2019s current readiness. You may be constrained by organizational capacity rather than personal knowledge.';
    } else if (orgNum > avgIndividual + 0.5) {
      gapText = 'Your organization\u2019s transformation ambitions may be ahead of your current comfort level in some domains. Targeted development would close this gap.';
    } else {
      gapText = 'Your individual capability and organizational readiness are relatively aligned \u2014 a solid foundation for coordinated growth.';
    }

    // Overall readiness percentage (for form submission)
    const overallPct = Math.round((avgIndividual / 4) * 100);

    // Role for display
    const roleNames = {
      ceo: 'Chief Executive Officer', cfo: 'Chief Financial Officer', cio: 'CIO / CTO',
      chro: 'CHRO', ciso: 'CISO', board: 'Board Member', other_exec: 'Senior Executive'
    };
    const roleName = roleNames[getRole()] || 'Senior Executive';

    app.innerHTML = `
      <div class="results-screen">
        <div class="results-header">
          <div class="label label--centered">
            <div class="gold-rule"></div>
            <span>Your Readiness Profile</span>
            <div class="gold-rule"></div>
          </div>
          <h2>Technology Leadership Readiness Assessment</h2>
          <p>Based on your responses, here is your personalized readiness profile across all four technology pillars.</p>
        </div>

        ${renderRadarChart()}

        <div class="results-grid">
          ${PILLAR_KEYS.map(pillar => {
            const cc = CC_LEVELS[state.pillarProfiles[pillar]];
            const num = ccToNum(state.pillarProfiles[pillar]);
            const pct = (num / 4) * 100;
            return `
              <div class="result-pillar-card">
                <div class="result-pillar-name">${PILLAR_NAMES[pillar]}</div>
                <div class="result-pillar-level">${cc.short}</div>
                <div class="result-cc-badge">${cc.code} \u2014 ${cc.name}</div>
                <div class="result-bar-track">
                  <div class="result-bar-fill" data-pct="${pct}"></div>
                </div>
                <div class="result-pillar-desc">${cc.desc}</div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="org-readiness-card">
          <h3>Organizational Readiness</h3>
          <div class="org-readiness-level">${orgInfo.name}</div>
          <div class="org-readiness-desc">${orgInfo.desc}</div>
          <div class="org-readiness-desc" style="margin-top:0.8rem;">${involvementText}</div>
          <div class="gap-indicator">
            <div class="gap-indicator-label">Individual vs. Organization Gap</div>
            <div class="gap-indicator-text">${gapText}</div>
          </div>
        </div>

        <div class="results-insights">
          <div class="key-insight">
            <div class="key-insight-label">Key Finding</div>
            <p>${keyInsight}</p>
          </div>
          <h3>Personalized Insights</h3>
          ${insights.map(text => `
            <div class="insight-item">
              <p>${text}</p>
            </div>
          `).join('')}
        </div>

        <div class="threshold-cta">
          <blockquote>This snapshot shows you where you stand. The deeper analysis \u2014 how your profile maps to your role, your industry, and the specific decisions you\u2019re facing \u2014 is where the real value begins.</blockquote>
          <p>The full interpretation includes role-specific implications, industry-contextualized priorities, and a development roadmap across all four pillars.</p>
          <a href="https://outlook.office.com/book/TheApexVectorStudio@apex-vector.com/" target="_blank" class="btn-primary">Schedule a Conversation</a>
        </div>

        <div class="results-form" id="resultsForm">
          <h3>Receive Your Complete Profile</h3>
          <p>Enter your details below to receive your full readiness profile and explore how The Apex Vector Studio can help you lead with confidence.</p>
          <form id="contactForm" action="${FORMSPREE_ENDPOINT}" method="POST">
            <input type="hidden" name="_subject" id="emailSubject" value="Technology Leadership Readiness \u2014 New Assessment">
            <input type="hidden" name="_replyto" id="replyTo">
            <input type="hidden" name="_autoresponse" id="autoResponse">
            <input type="hidden" name="Role Category" value="${getRole()}">
            <input type="hidden" name="Industry" value="${getIndustry()}">
            <input type="hidden" name="Overall Readiness" value="${overallPct}%">
            <input type="hidden" name="Track" value="${state.track || 'N/A'}">
            ${PILLAR_KEYS.map(p => {
              const cc = CC_LEVELS[state.pillarProfiles[p]];
              return '<input type="hidden" name="' + PILLAR_NAMES[p] + '" value="' + cc.short + ' (' + cc.name + ')">';
            }).join('\n            ')}
            <input type="hidden" name="Organizational Readiness" value="${orgInfo.name}">
            <input type="hidden" name="Gap Analysis" id="gapField">
            <input type="hidden" name="Key Finding" id="keyFindingField">
            <input type="hidden" name="Insights" id="insightsField">
            <div class="form-grid">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="first_name" placeholder="First name" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="last_name" placeholder="Last name" required>
              </div>
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
              </div>
              <div class="form-group">
                <label for="organization">Organization</label>
                <input type="text" id="organization" name="organization" placeholder="Your organization">
              </div>
              <div class="form-group full-width">
                <label for="roleTitle">Your Title / Role</label>
                <input type="text" id="roleTitle" name="role_title" placeholder="e.g., Chief Executive Officer">
              </div>
            </div>
            <div class="form-submit-row">
              <button type="submit" class="btn-primary" style="width:100%;">Send My Results</button>
            </div>
            <p class="form-note">Your information is confidential and will only be used to deliver your results and explore whether the practice is a fit.</p>
          </form>
        </div>
      </div>
    `;

    // Populate structured hidden fields for clean Formspree email
    document.getElementById('gapField').value = gapText.replace(/<[^>]*>/g, '');
    document.getElementById('keyFindingField').value = keyInsight.replace(/<[^>]*>/g, '');
    document.getElementById('insightsField').value = insights.map((text, i) => (i + 1) + '. ' + text.replace(/<[^>]*>/g, '')).join(' | ');

    // Build auto-response message for the client
    let autoMsg = 'Thank you for completing the Technology Leadership Readiness Assessment from The Apex Vector Studio.\n\n';
    autoMsg += 'YOUR RESULTS SUMMARY\n';
    autoMsg += '========================\n\n';
    autoMsg += 'Overall Readiness: ' + overallPct + '%\n\n';
    PILLAR_KEYS.forEach(pillar => {
      const cc = CC_LEVELS[state.pillarProfiles[pillar]];
      autoMsg += PILLAR_NAMES[pillar] + ': ' + cc.short + '\n';
    });
    autoMsg += '\nOrganizational Readiness: ' + orgInfo.name + '\n\n';
    autoMsg += 'KEY FINDING\n';
    autoMsg += keyInsight.replace(/<[^>]*>/g, '') + '\n\n';
    autoMsg += '---\n\n';
    autoMsg += 'Ready to explore what these results mean for your leadership?\n';
    autoMsg += 'Schedule a conversation: https://outlook.office.com/book/TheApexVectorStudio@apex-vector.com/\n\n';
    autoMsg += 'The Apex Vector Studio\nhttps://www.apex-vector.com';
    document.getElementById('autoResponse').value = autoMsg;

    // Animate bars
    requestAnimationFrame(() => {
      document.querySelectorAll('.result-bar-fill').forEach(bar => {
        setTimeout(() => {
          bar.style.width = bar.dataset.pct + '%';
        }, 300);
      });
    });

    // Form submission
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = this;

      const fn = document.getElementById('firstName').value;
      const ln = document.getElementById('lastName').value;
      const em = document.getElementById('email').value;
      document.getElementById('emailSubject').value = 'Technology Leadership Readiness \u2014 ' + fn + ' ' + ln + ' \u2014 ' + overallPct + '%';
      document.getElementById('replyTo').value = em;

      const formData = new FormData(form);

      fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        const formContainer = document.getElementById('resultsForm');
        if (response.ok) {
          formContainer.innerHTML = `
            <div class="form-success">
              <h4>Thank You</h4>
              <p>Your readiness profile has been sent. We\u2019ll be in touch to explore whether The Apex Vector Studio is the right fit for your leadership journey.</p>
              <a href="index.html" class="btn-ghost" style="margin-top: 1.5rem;">Return Home</a>
            </div>
          `;
        } else {
          formContainer.innerHTML = `
            <div class="form-success">
              <h4>Something Went Wrong</h4>
              <p>We weren\u2019t able to submit your information. Please try again or reach out directly through our <a href="index.html#contact" style="color: var(--gold);">contact page</a>.</p>
              <button class="btn-ghost" style="margin-top: 1.5rem;" onclick="location.reload()">Try Again</button>
            </div>
          `;
        }
      }).catch(() => {
        const formContainer = document.getElementById('resultsForm');
        formContainer.innerHTML = `
          <div class="form-success">
            <h4>Connection Error</h4>
            <p>Please check your internet connection and try again, or reach out directly through our <a href="index.html#contact" style="color: var(--gold);">contact page</a>.</p>
            <button class="btn-ghost" style="margin-top: 1.5rem;" onclick="location.reload()">Try Again</button>
          </div>
        `;
      });
    });
  }

  // ===== INIT =====
  render();

})();
</script>

</body>
</html>
